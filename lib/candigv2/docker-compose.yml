volumes:
  toil-jobstore:
    external: true
  prometheus-data:
    external: true
  grafana-data:
    external: true
  keycloak-data:
    external: true
  opa-data:
    external: true
  tyk-data:
    external: true
  redis-data:
    external: true
  vault-data:
    external: true
  htsget-data:
    external: true
  postgres-data:
    external: true
  query-data:
    external: true

secrets:
  postgres-db-secret:
    file: $PWD/tmp/postgres/db-secret
    labels:
      - "candigv2=secret"
  keycloak-admin-password:
    file: $PWD/tmp/keycloak/admin-password
    labels:
      - "candigv2=secret"
  keycloak-client-secret:
    file: $PWD/tmp/keycloak/client-secret
    labels:
      - "candigv2=secret"
  tyk-secret-key:
    file: $PWD/tmp/tyk/secret-key
    labels:
      - "candigv2=secret"
  redis-secret-key:
    file: $PWD/tmp/redis/secret-key
    labels:
      - "candigv2=secret"
