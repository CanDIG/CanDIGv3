volumes:
  minio-data:
    external: true
  minio-config:
    external: true
secrets:
  minio-access-key:
    file: $PWD/lib/minio/access-key
  minio-secret-key:
    file: $PWD/lib/minio/secret-key
services:
  minio:
    image: minio/minio:${MINIO_VERSION:-latest}
    volumes:
      - minio-data:/data
      - minio-config:/root/.minio
    ports:
      - "${MINIO_UI_PORT}:9001"
      - "${MINIO_PORT}:9000"
    environment:
      - MINIO_REGION=${MINIO_REGION}
      - MINIO_ADDRESS=:${MINIO_PORT}
    secrets:
      - source: minio-access-key
        target: access_key
      - source: minio-secret-key
        target: secret_key
    extra_hosts:
        - "${CANDIG_DOMAIN}:${LOCAL_IP_ADDR}"
    command: ["server", "/data","--console-address", ":${MINIO_UI_PORT}"]
    healthcheck:
      test: timeout 5s bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1
      interval: 5s
      retries: 1
      start_period: 5s
      timeout: 5s
