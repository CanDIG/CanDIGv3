services:
  drs:
    logging:
      driver: "fluentd"
      options:
        tag: "{{.Name}}"
    build:
      context: $PWD/lib/drs/drs
      args:
        venv_python: "${VENV_PYTHON}"
    image: ${DOCKER_REGISTRY}/drs:${HTSGET_VERSION:-latest}
    labels:
      - "candigv2=drs"
    volumes:
      - htsget-data:/data
    ports:
      - "${DRS_PORT}:3001"
    secrets:
      - source: postgres-db-secret
        target: postgres-db-secret
    environment:
      HTSGET_TEST_KEY: "hoodlebug"
      DRS_URL: ${TYK_LOGIN_TARGET_URL}/${TYK_DRS_API_LISTEN_PATH}
      DRS_PRIVATE_URL: ${DRS_PRIVATE_URL}
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_AUTH_PREFIX: ${KEYCLOAK_AUTH_PREFIX}
      OPA_URL: ${OPA_PRIVATE_URL}
      VAULT_URL: ${VAULT_PRIVATE_URL}
      DEBUG_MODE: ${CANDIG_DEBUG_MODE}
      DB_PATH: "postgres-db"
      SERVER_LOCAL_DATA: /app/drs_server/data
      TESTENV_URL: ${HTSGET_PRIVATE_URL}
      POSTGRES_DATABASE: "genomic"
      POSTGRES_HOST_FILE: "postgres-db"
      POSTGRES_USERNAME: ${DEFAULT_ADMIN_USER}
      POSTGRES_PASSWORD_FILE: "/run/secrets/postgres-db-secret"
      SERVICE_NAME: ${SERVICE_NAME}
    extra_hosts:
      - "${CANDIG_DOMAIN}:${LOCAL_IP_ADDR}"
      - "${ECS_DOMAIN}:${ECS_IP_ADDR}"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "${DRS_PRIVATE_URL}/ga4gh/drs/v1/service-info",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
