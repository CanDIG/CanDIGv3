services:
  opa:
    image: openpolicyagent/opa:1.0.0-static
    logging:
      driver: "fluentd"
      options:
        tag: "{{.Name}}"
    labels:
      - "candigv2=opa"
    ports:
      - "${OPA_PORT}:8181"
    volumes:
      - opa-data:/app
    command:
      - "run"
      - "--set=decision_logs.console=true"
      - "--log-level=info"
      - "--authentication=token"
      - "--authorization=basic"
      - "-s"
      - "--addr=0.0.0.0:8181"
      - "app/permissions_engine/"
    extra_hosts:
      - "${CANDIG_DOMAIN}:${LOCAL_IP_ADDR}"
  opa-runner:
    logging:
      driver: "fluentd"
      options:
        tag: "{{.Name}}"
    build:
      context: $PWD/lib/opa/opa
      args:
        venv_python: "${VENV_PYTHON}"
        alpine_version: "${ALPINE_VERSION}"
        katsu_url: "${KATSU_PUBLIC_URL}"
        idp: "${KEYCLOAK_REALM_URL}"
    image: ${DOCKER_REGISTRY}/opa-runner:${OPA_VERSION:-latest}
    labels:
      - "candigv2=opa"
    volumes:
      - opa-data:/app
    environment:
      KEYCLOAK_PUBLIC_URL: ${KEYCLOAK_PUBLIC_URL}
      KEYCLOAK_AUTH_PREFIX: ${KEYCLOAK_AUTH_PREFIX}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_REALM_URL: ${KEYCLOAK_ISSUER_URL}
      KEYCLOAK_URL: ${KEYCLOAK_PRIVATE_URL}
      OPA_URL: ${OPA_PRIVATE_URL}
      VAULT_URL: ${VAULT_PRIVATE_URL}
      SERVICE_NAME: ${SERVICE_NAME}
      CANDIG_USER_KEY: ${CANDIG_USER_KEY}
      SITE_ADMIN_USER: ${DEFAULT_SITE_ADMIN_USER}
      USER1: ${TEST_USER_1}
      USER2: ${TEST_USER_2}
      DEBUG_MODE: ${CANDIG_DEBUG_MODE}
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "--fail",
          "${OPA_PRIVATE_URL}/v1/data/service/service-info",
        ]
      interval: 30s
      timeout: 20s
      retries: 3
    extra_hosts:
      - "${CANDIG_DOMAIN}:${LOCAL_IP_ADDR}"
    entrypoint:
      - "bash"
      - "/app/entrypoint.sh"
