services:
  candig-api:
    build:
      context: $PWD/lib/candig-api/candig-api
      args:
        venv_python: "${VENV_PYTHON}"
    logging:
      driver: "fluentd"
      options:
        tag: "{{.Name}}"
    ports:
      - "${CANDIG_API_PORT}:8000"
    extra_hosts:
      - "${CANDIG_DOMAIN}:${LOCAL_IP_ADDR}"
    environment:
      - DB_USER=${DEFAULT_ADMIN_USER}
      - DB_PASSWORD_FILE=/run/secrets/postgres_db_secret
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - CANDIG_SCHEMA=${CANDIG_SCHEMA}
      - CDM_SCHEMA=${CDM_SCHEMA}
      - OPA_URL=${OPA_PRIVATE_URL}
      # Info for the Beacon endpoint
      - CANDIG_API_PUBLIC_URL=${CANDIG_API_PUBLIC_URL}
      - CANDIG_SITE_LOCATION=${CANDIG_SITE_LOCATION}
      - CANDIG_DATA_PORTAL_SUPPORT_EMAIL=${CANDIG_DATA_PORTAL_SUPPORT_EMAIL}
    secrets:
      - source: postgres-db-secret
        target: postgres_db_secret
    labels:
      - "candigv3=candig-api"
